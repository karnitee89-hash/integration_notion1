<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ziel-Tracker Embed</title>
  <style>
    :root {
      --panel: rgba(2, 8, 11, 0.96);
      --cyan: #00e7ff;
      --text: #e6fcff;
      --border: rgba(0, 231, 255, 0.22);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(0,231,255,0.08), transparent 22%),
        linear-gradient(180deg, #010406 0%, #02080b 100%);
      color: var(--text);
    }

    body { padding: 6px; }

    .hud {
      width: min(980px, 100%);
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid var(--border);
      box-shadow: 0 0 14px rgba(0, 231, 255, 0.06), inset 0 0 10px rgba(0, 231, 255, 0.03);
      position: relative;
      overflow: hidden;
    }

    .hud::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(0,231,255,0.1) 0.7px, transparent 0.7px);
      background-size: 14px 14px;
      opacity: 0.14;
      pointer-events: none;
    }

    .scanline {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 0%, rgba(0,231,255,0.035) 50%, transparent 100%);
      background-size: 100% 8px;
      mix-blend-mode: screen;
      opacity: 0.14;
      pointer-events: none;
    }

    .sweep {
      position: absolute;
      top: 0;
      left: -35%;
      width: 35%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0,231,255,0.06), transparent);
      transform: skewX(-20deg);
      animation: sweep 10s linear infinite;
      pointer-events: none;
    }

    @keyframes sweep {
      0% { left: -35%; }
      100% { left: 140%; }
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 9px 12px;
      border-bottom: 1px solid var(--border);
      position: relative;
      z-index: 1;
    }

    .eyebrow {
      color: var(--cyan);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      margin-bottom: 4px;
    }

    .header h1 {
      margin: 0;
      font-size: 14px;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: white;
    }

    .status {
      color: var(--cyan);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      white-space: nowrap;
      opacity: 0.8;
    }

    .content {
      padding: 10px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      position: relative;
      z-index: 1;
      align-items: start;
    }

    .goal-card {
      background: linear-gradient(180deg, rgba(3,11,14,0.98), rgba(2,8,11,0.98));
      border: 1px solid rgba(0,231,255,0.18);
      padding: 10px;
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 0 10px rgba(0,231,255,0.025);
      min-width: 0;
    }

    .goal-card::after {
      content: "";
      position: absolute;
      inset: auto 0 0 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,231,255,0.55), transparent);
      opacity: 0.7;
    }

    .goal-title {
      font-size: 14px;
      font-weight: 800;
      color: var(--cyan);
      text-transform: uppercase;
      letter-spacing: 0.16em;
      text-shadow: 0 0 8px rgba(0,231,255,0.16);
      margin-bottom: 8px;
    }

    .goal-text {
      width: 100%;
      background: rgba(0,0,0,0.26);
      border: 1px solid rgba(0,231,255,0.18);
      color: white;
      padding: 8px 9px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }

    .goal-text:focus {
      border-color: rgba(0,231,255,0.5);
      box-shadow: 0 0 0 1px rgba(0,231,255,0.16), 0 0 12px rgba(0,231,255,0.06);
      transform: translateY(-1px);
    }

    .goal-text::placeholder {
      color: #79b9c1;
    }

    .progress {
      position: relative;
      width: 100%;
      height: 12px;
      margin-top: 10px;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(0,231,255,0.16);
      overflow: hidden;
    }

    .progress::before {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        90deg,
        transparent 0,
        transparent 13px,
        rgba(0,231,255,0.05) 13px,
        rgba(0,231,255,0.05) 14px
      );
      pointer-events: none;
    }

    .bar {
      position: relative;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #10ffc8, #36ffd9);
      box-shadow: 0 0 10px rgba(0,231,255,0.25);
      transition: width 0.35s ease;
    }

    .bar::after {
      content: "";
      position: absolute;
      top: 0;
      right: -30px;
      width: 30px;
      height: 100%;
      background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,0.55), rgba(255,255,255,0));
      animation: shimmer 2s linear infinite;
      opacity: 0.55;
    }

    @keyframes shimmer {
      0% { transform: translateX(-8px); opacity: 0; }
      20% { opacity: 0.7; }
      100% { transform: translateX(22px); opacity: 0; }
    }

    .footer {
      padding: 0 12px 10px;
      font-size: 10px;
      color: #5fa4ab;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      position: relative;
      z-index: 1;
    }

    @media (max-width: 720px) {
      body { padding: 4px; }
      .header { padding: 9px 11px; }
      .content {
        padding: 10px;
        grid-template-columns: 1fr;
      }
      .goal-title { font-size: 14px; }
      .status { display: none; }
    }
  </style>
</head>
<body>
  <div class="hud">
    <div class="scanline"></div>
    <div class="sweep"></div>

    <div class="header">
      <div>
        <div class="eyebrow">System.Goals.v4</div>
        <h1>Status Profile</h1>
      </div>
      <div class="status">Goal Sync Active</div>
    </div>

    <div class="content">
      <section class="goal-card" data-goal="week">
        <div class="goal-title">Wochenziel</div>
        <input class="goal-text" id="weekText" value="3/5 Zeichnungen" placeholder="z. B. 5/7 Trainings oder 3/5 Zeichnungen" />
        <div class="progress"><div class="bar" id="weekBar"></div></div>
      </section>

      <section class="goal-card" data-goal="month">
        <div class="goal-title">Monatsziel</div>
        <input class="goal-text" id="monthText" value="8/20 Sporteinheiten" placeholder="z. B. 12/20 Sporteinheiten oder 4/8 Werke" />
        <div class="progress"><div class="bar" id="monthBar"></div></div>
      </section>

      <section class="goal-card" data-goal="year">
        <div class="goal-title">Jahresziel</div>
        <input class="goal-text" id="yearText" value="40/100 Trainings" placeholder="z. B. 40/100 Trainings oder 2/5 große Projekte" />
        <div class="progress"><div class="bar" id="yearBar"></div></div>
      </section>
    </div>

    <div class="footer">Hunter Interface // Compact Goal Embed</div>
  </div>

  <script>
    const goals = ["week", "month", "year"];

    function extractProgress(text) {
      const match = String(text || "").match(/(\d+)\s*\/\s*(\d+)/);
      if (!match) return 0;
      const current = Number(match[1]) || 0;
      const target = Number(match[2]) || 0;
      if (target <= 0) return 0;
      return Math.min(100, Math.round((current / target) * 100));
    }

    function updateGoal(name) {
      const text = document.getElementById(`${name}Text`).value || "";
      const percent = extractProgress(text);
      document.getElementById(`${name}Bar`).style.width = `${percent}%`;
      saveState();
    }

    function saveState() {
      const state = {};
      goals.forEach(name => {
        state[name] = {
          text: document.getElementById(`${name}Text`).value
        };
      });
      localStorage.setItem("notionGoalEmbedStateCompact", JSON.stringify(state));
    }

    function loadState() {
      const raw = localStorage.getItem("notionGoalEmbedStateCompact");
      if (!raw) {
        goals.forEach(updateGoal);
        return;
      }

      try {
        const state = JSON.parse(raw);
        goals.forEach(name => {
          if (state[name]?.text) {
            document.getElementById(`${name}Text`).value = state[name].text;
          }
          updateGoal(name);
        });
      } catch (error) {
        console.error("Konnte gespeicherten State nicht laden:", error);
        goals.forEach(updateGoal);
      }
    }

    goals.forEach(name => {
      document.getElementById(`${name}Text`).addEventListener("input", () => {
        updateGoal(name);
      });
    });

    loadState();
  </script>
</body>
</html>
